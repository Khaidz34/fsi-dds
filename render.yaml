services:
  - type: web
    name: fsi-dds-backend
    env: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install --production
    startCommand: cd backend && npm run start:supabase
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: YOUR_SUPABASE_URL_HERE
      - key: SUPABASE_ANON_KEY
        value: YOUR_SUPABASE_ANON_KEY_HERE
      - key: PORT
        value: 10000