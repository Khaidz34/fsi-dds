services:
  - type: web
    name: fsi-dds-backend
    env: node
    plan: free
    region: singapore
    buildCommand: bash build.sh
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: https://abeaqpjfngcwjlcaypzh.supabase.co
      - key: SUPABASE_ANON_KEY
        value: YOUR_SUPABASE_ANON_KEY_HERE
      - key: PORT
        value: 10000