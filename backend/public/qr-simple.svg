<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="white" stroke="#ddd" stroke-width="1"/>
  
  <!-- Simple QR pattern -->
  <g fill="black">
    <!-- Top-left corner -->
    <rect x="20" y="20" width="50" height="50"/>
    <rect x="30" y="30" width="30" height="30" fill="white"/>
    <rect x="35" y="35" width="20" height="20"/>
    
    <!-- Top-right corner -->
    <rect x="130" y="20" width="50" height="50"/>
    <rect x="140" y="30" width="30" height="30" fill="white"/>
    <rect x="145" y="35" width="20" height="20"/>
    
    <!-- Bottom-left corner -->
    <rect x="20" y="130" width="50" height="50"/>
    <rect x="30" y="140" width="30" height="30" fill="white"/>
    <rect x="35" y="145" width="20" height="20"/>
    
    <!-- Data dots -->
    <rect x="90" y="20" width="8" height="8"/>
    <rect x="110" y="20" width="8" height="8"/>
    <rect x="90" y="40" width="8" height="8"/>
    <rect x="110" y="40" width="8" height="8"/>
    <rect x="90" y="60" width="8" height="8"/>
    <rect x="110" y="60" width="8" height="8"/>
    
    <rect x="20" y="90" width="8" height="8"/>
    <rect x="40" y="90" width="8" height="8"/>
    <rect x="60" y="90" width="8" height="8"/>
    <rect x="20" y="110" width="8" height="8"/>
    <rect x="40" y="110" width="8" height="8"/>
    <rect x="60" y="110" width="8" height="8"/>
    
    <rect x="130" y="90" width="8" height="8"/>
    <rect x="150" y="90" width="8" height="8"/>
    <rect x="170" y="90" width="8" height="8"/>
    <rect x="130" y="110" width="8" height="8"/>
    <rect x="150" y="110" width="8" height="8"/>
    <rect x="170" y="110" width="8" height="8"/>
    
    <rect x="90" y="130" width="8" height="8"/>
    <rect x="110" y="130" width="8" height="8"/>
    <rect x="130" y="130" width="8" height="8"/>
    <rect x="150" y="130" width="8" height="8"/>
    <rect x="170" y="130" width="8" height="8"/>
    
    <rect x="90" y="150" width="8" height="8"/>
    <rect x="110" y="150" width="8" height="8"/>
    <rect x="130" y="150" width="8" height="8"/>
    <rect x="150" y="150" width="8" height="8"/>
    <rect x="170" y="150" width="8" height="8"/>
    
    <rect x="90" y="170" width="8" height="8"/>
    <rect x="110" y="170" width="8" height="8"/>
    <rect x="130" y="170" width="8" height="8"/>
    <rect x="150" y="170" width="8" height="8"/>
    <rect x="170" y="170" width="8" height="8"/>
  </g>
  
  <!-- Center pattern -->
  <rect x="85" y="85" width="30" height="30" fill="black"/>
  <rect x="90" y="90" width="20" height="20" fill="white"/>
  <rect x="95" y="95" width="10" height="10" fill="black"/>
</svg>